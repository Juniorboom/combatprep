databases:
  - name: combatprep-db
    plan: free
    databaseName: combatprep
    user: combatprep

services:
  - type: web
    name: combatprep
    plan: free
    runtime: python
    buildCommand: bash build.sh
    startCommand: gunicorn combatprep.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: combatprep-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: PYTHON_VERSION
        value: "3.9.6"
